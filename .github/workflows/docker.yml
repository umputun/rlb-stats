name: Docker Build

on:
  workflow_run:
    workflows: [CI Build]
    types: [completed]

permissions:
  contents: read

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'master' ||
       startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
    runs-on: ${{ matrix.runner }}

    steps:
    - name: checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
        persist-credentials: false

    - name: set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: login to ghcr.io
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.PKG_TOKEN }}

    - name: login to DockerHub
      uses: docker/login-action@v4
      with:
        username: umputun
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: set build info
      id: info
      env:
        HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      run: |
        echo "ref=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
        echo "sha7=${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"

    - name: build and push to ghcr.io by digest
      id: build-ghcr
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: ${{ matrix.platform }}
        build-args: |
          CI=github
          GITHUB_SHA=${{ steps.info.outputs.sha7 }}
          GIT_BRANCH=${{ steps.info.outputs.ref }}
        outputs: type=image,name=ghcr.io/umputun/rlb-stats,push-by-digest=true,name-canonical=true,push=true

    - name: build and push to DockerHub by digest
      id: build-dockerhub
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: ${{ matrix.platform }}
        build-args: |
          CI=github
          GITHUB_SHA=${{ steps.info.outputs.sha7 }}
          GIT_BRANCH=${{ steps.info.outputs.ref }}
        outputs: type=image,name=umputun/rlb-stats,push-by-digest=true,name-canonical=true,push=true

    - name: export digests
      run: |
        mkdir -p /tmp/digests/ghcr /tmp/digests/dockerhub
        digest_ghcr="${{ steps.build-ghcr.outputs.digest }}"
        digest_dockerhub="${{ steps.build-dockerhub.outputs.digest }}"
        touch "/tmp/digests/ghcr/${digest_ghcr#sha256:}"
        touch "/tmp/digests/dockerhub/${digest_dockerhub#sha256:}"

    - name: upload ghcr digest
      uses: actions/upload-artifact@v7
      with:
        name: digests-ghcr-${{ matrix.artifact }}
        path: /tmp/digests/ghcr/*
        retention-days: 1

    - name: upload dockerhub digest
      uses: actions/upload-artifact@v7
      with:
        name: digests-dockerhub-${{ matrix.artifact }}
        path: /tmp/digests/dockerhub/*
        retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
    - name: download ghcr digests
      uses: actions/download-artifact@v8
      with:
        path: /tmp/digests/ghcr
        pattern: digests-ghcr-*
        merge-multiple: true

    - name: download dockerhub digests
      uses: actions/download-artifact@v8
      with:
        path: /tmp/digests/dockerhub
        pattern: digests-dockerhub-*
        merge-multiple: true

    - name: verify all digests present
      run: |
        for registry in ghcr dockerhub; do
          expected=2
          actual=$(find "/tmp/digests/${registry}" -maxdepth 1 -type f | wc -l)
          if [ "$actual" -ne "$expected" ]; then
            echo "Expected $expected digests for ${registry}, found $actual"
            ls -la "/tmp/digests/${registry}"
            exit 1
          fi
          echo "All $expected digests present for ${registry}"
        done

    - name: set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: login to ghcr.io
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.PKG_TOKEN }}

    - name: login to DockerHub
      uses: docker/login-action@v4
      with:
        username: umputun
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: set docker tag
      id: tag
      env:
        HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      run: |
        if [[ "$HEAD_BRANCH" == v* ]]; then
          echo "tag=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "is_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "is_release=false" >> "$GITHUB_OUTPUT"
        fi

    - name: create ghcr manifest and push
      working-directory: /tmp/digests/ghcr
      run: |
        tags="-t ghcr.io/umputun/rlb-stats:${{ steps.tag.outputs.tag }}"
        if [[ "${{ steps.tag.outputs.is_release }}" == "true" ]]; then
          tags="$tags -t ghcr.io/umputun/rlb-stats:latest"
        fi
        docker buildx imagetools create $tags \
          $(printf 'ghcr.io/umputun/rlb-stats@sha256:%s ' *)

    - name: create dockerhub manifest and push
      working-directory: /tmp/digests/dockerhub
      run: |
        tags="-t umputun/rlb-stats:${{ steps.tag.outputs.tag }}"
        if [[ "${{ steps.tag.outputs.is_release }}" == "true" ]]; then
          tags="$tags -t umputun/rlb-stats:latest"
        fi
        docker buildx imagetools create $tags \
          $(printf 'umputun/rlb-stats@sha256:%s ' *)
